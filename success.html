<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Готово!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:#f8fcf9;
  color:#162422;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
}
.card{
  text-align:center;
  max-width:480px;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:2.2rem;
  color:#0d5c63;
  margin-bottom:16px;
}
p{
  font-size:1.05rem;
  line-height:1.7;
  color:#3d514f;
  margin-bottom:24px;
}
a{
  display:inline-block;
  padding:14px 36px;
  background:#0d5c63;
  color:#f5faf8;
  border-radius:50px;
  text-decoration:none;
  font-weight:600;
  transition:transform .2s;
}
a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="card">
  <h1>Спасибо!</h1>
  <p>Заявка отправлена. Я свяжусь с вами в ближайшее время.</p>
  <a href="/">Вернуться на сайт</a>
</div>
</body>
</html>
